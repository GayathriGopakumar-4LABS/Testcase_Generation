[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# The URL here is a placeholder; env.py reads DATABASE_URL from the app config
sqlalchemy.url = postgresql+asyncpg://postgres:password@localhost:5432/qa_generator

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
